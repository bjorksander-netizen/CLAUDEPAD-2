name: Build APK

on:
  push:
    branches: [ main ]
    paths: [ "android/**", ".github/workflows/build-apk.yml" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CLAUDEPAD.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CLAUDEPAD-apk
          path: CLAUDEPAD.apk

      - name: Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "CLAUDEPAD APK (latest build)"
          files: CLAUDEPAD.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

