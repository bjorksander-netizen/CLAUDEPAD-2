name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - "android/**"
      - "server/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  # Verifikasi protokol server sebelum APK dibangun.
  verify-server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # v2.4: API process_request berbeda antara websockets <14 dan >=14.
        # Server harus jalan di keduanya - diuji nyata, bukan diasumsikan.
        websockets: ["12.0", "13.1", "15.0.1"]
    name: verify-server (websockets ${{ matrix.websockets }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency server
        run: pip install "websockets==${{ matrix.websockets }}"

      - name: Uji kripto vs RFC 8439
        working-directory: server
        run: |
          python - <<'PY'
          import crypto_box as cb
          key = bytes(range(32))
          nonce = bytes([0,0,0,0,0,0,0,0x4a,0,0,0,0])
          plain = (b"Ladies and Gentlemen of the class of '99: If I could offer you "
                   b"only one tip for the future, sunscreen would be it.")
          ct = cb.chacha20(key, nonce, plain, 1)
          assert ct[:16] == bytes.fromhex("6e2e359a2568f98041ba0728dd0d6981")
          # seal/open bolak-balik + tolak kunci salah
          salt = cb.new_salt()
          a = cb.Session.derive("1234", salt); b = cb.Session.derive("1234", salt)
          blob = a.seal(b"halo"); assert b.open(blob) == b"halo"
          c = cb.Session.derive("9999", salt)
          try: c.open(a.seal(b"x")); raise SystemExit("kunci salah lolos!")
          except ValueError: pass
          print("OK - ChaCha20 cocok RFC 8439, seal/open & tolak kunci salah")
          PY

      - name: Uji dispatch protokol
        working-directory: server
        run: |
          python - <<'PY'
          import input_core as core
          sent = []
          msgs = [
              {"t":"move","dx":5,"dy":-3}, {"t":"click","b":"left"},
              {"t":"click","b":"right","double":True},
              {"t":"down","b":"left"}, {"t":"up","b":"left"},
              {"t":"scroll","dy":120}, {"t":"zoom","dir":1}, {"t":"zoom","dir":-1},
              {"t":"gesture","g":"taskview"}, {"t":"gesture","g":"showdesktop"},
              {"t":"gesture","g":"appnext"}, {"t":"gesture","g":"appprev"},
              {"t":"gesture","g":"bogus"}, {"t":"text","s":"halo"},
              {"t":"key","k":"enter"}, {"t":"key","k":"tab","mods":["win"]},
              {"t":"key","k":"c","mods":["ctrl"]}, {"t":"key","k":"up"},
              {"t":"media","a":"playpause"}, {"t":"media","a":"bogus"},
              {"t":"volget"}, {"t":"volset","v":73}, {"t":"volset","v":999},
              {"t":"ping"}, {"t":"unknown"}, {},
          ]
          for m in msgs:
              core.handle_message(m, sent.append)
          assert len(core.new_pin()) == 8
          assert core.VK["win"] == 0x5B and "d" in core.VK
          print(f"OK - {len(msgs)} varian pesan diproses tanpa crash")
          PY

      - name: Uji end-to-end WebSocket
        working-directory: server
        run: |
          python - <<'PY'
          import asyncio, json, sys, socket
          sys.argv = ["x", "--nogui"]
          import pc_server as srv, input_core as core, websockets

          async def main():
              srv.start_server_thread()
              await asyncio.sleep(1.0)

              async with websockets.connect("ws://127.0.0.1:8765/ws") as ws:
                  bad = "0000" if core.PIN != "0000" else "1111"
                  await ws.send(json.dumps({"t":"auth","pin":bad,"ver":srv.APP_VERSION}))
                  assert json.loads(await ws.recv())["t"] == "auth_fail"
              print("OK - PIN salah ditolak")

              async with websockets.connect("ws://127.0.0.1:8765/ws") as ws:
                  await ws.send(json.dumps({"t":"auth","pin":core.PIN,"ver":"9.9"}))
                  r = json.loads(await ws.recv())
                  assert r["t"] == "auth_fail" and r.get("reason") == "version"
              print("OK - versi APK beda ditolak")

              async with websockets.connect("ws://127.0.0.1:8765/ws") as ws:
                  await ws.send(json.dumps({"t":"auth","pin":core.PIN,"ver":srv.APP_VERSION}))
                  r = json.loads(await ws.recv())
                  assert r["t"] == "auth_ok" and r["host"] == core.HOSTNAME
                  assert r["version"] == srv.APP_VERSION
                  print("OK - auth_ok membawa metadata")

                  for m in [{"t":"move","dx":3,"dy":3}, {"t":"gesture","g":"taskview"},
                            {"t":"key","k":"tab","mods":["win"]}, {"t":"volset","v":50}]:
                      await ws.send(json.dumps(m))
                  await ws.send("{json rusak")
                  await ws.send(json.dumps({"t":"ping"}))
                  # Beberapa pesan boleh membalas duluan (mis. volerr saat pycaw
                  # tidak tersedia di runner Linux), jadi baca sampai ketemu pong.
                  for _ in range(10):
                      r = json.loads(await asyncio.wait_for(ws.recv(), 5))
                      if r["t"] == "pong":
                          break
                  else:
                      raise AssertionError("pong tidak diterima")
                  print("OK - pesan kontrol & JSON rusak ditangani")

                  # kontrol radio PC harus SELALU membalas, walau di runner Linux
                  # perangkatnya tidak ada - klien tidak boleh menggantung
                  for dev in ("wifi", "bluetooth", "hotspot"):
                      await ws.send(json.dumps({"t":"radio","d":dev}))
                      rr = json.loads(await asyncio.wait_for(ws.recv(), 20))
                      assert rr["t"] == "radio_result" and rr["d"] == dev and "msg" in rr, rr
                  print("OK - radio_result selalu dibalas")

                  # kecerahan & aksi daya juga wajib selalu membalas
                  await ws.send(json.dumps({"t":"bright","d":10}))
                  br = json.loads(await asyncio.wait_for(ws.recv(), 20))
                  assert br["t"] == "bright_result" and "msg" in br, br
                  for act in ("shutdown","restart","sleep","hibernate",
                              "logoff","lock","screenoff"):
                      await ws.send(json.dumps({"t":"power","a":act}))
                      pr = json.loads(await asyncio.wait_for(ws.recv(), 20))
                      assert pr["t"] == "power_result" and pr["a"] == act, pr
                  print("OK - bright_result & power_result dibalas")

              # pairing: masuk dengan PIN memberi token, token itu bisa dipakai
              # untuk masuk lagi tanpa mengetik PIN
              async with websockets.connect("ws://127.0.0.1:8765/ws") as ws2:
                  await ws2.send(json.dumps({"t":"auth","pin":core.PIN,
                                             "ver":srv.APP_VERSION}))
                  a = json.loads(await ws2.recv())
                  tok = a.get("token","")
                  assert tok, "server harus memberi token pairing"
              async with websockets.connect("ws://127.0.0.1:8765/ws") as ws3:
                  await ws3.send(json.dumps({"t":"auth","token":tok,
                                             "ver":srv.APP_VERSION}))
                  a = json.loads(await ws3.recv())
                  assert a["t"] == "auth_ok", a
              async with websockets.connect("ws://127.0.0.1:8765/ws") as ws4:
                  await ws4.send(json.dumps({"t":"auth","token":"palsu",
                                             "ver":srv.APP_VERSION}))
                  a = json.loads(await ws4.recv())
                  assert a["t"] == "auth_fail", a
              print("OK - pairing token: diberi, diterima, yang palsu ditolak")

              # enkripsi v3.0: handshake hello -> salt -> auth -> traffic terenkripsi
              import crypto_box as cb
              async with websockets.connect("ws://127.0.0.1:8765/ws") as we:
                  await we.send(json.dumps({"t":"hello"}))
                  h = json.loads(await we.recv())
                  assert h["t"] == "hello_ok" and "salt" in h, h
                  salt = bytes.fromhex(h["salt"])
                  await we.send(json.dumps({"t":"auth","pin":core.PIN,"ver":srv.APP_VERSION}))
                  a = json.loads(await we.recv())
                  assert a["t"] == "auth_ok" and a["encrypted"] is True, a
                  box = cb.Session.derive(core.PIN, salt)
                  await we.send(box.seal(json.dumps({"t":"ping"}).encode()))
                  raw = await we.recv()
                  assert isinstance(raw, (bytes, bytearray)), "balasan harus terenkripsi"
                  assert json.loads(box.open(raw).decode())["t"] == "pong"
              print("OK - enkripsi lalu lintas end-to-end")

              await asyncio.sleep(0.4)
              assert len(core.CLIENTS) == 0
              print("OK - registry klien dibersihkan")

              s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.settimeout(3)
              s.sendto(b"DISCOVER_CLAUDEPAD", ("127.0.0.1", 8766))
              data, _ = s.recvfrom(256); s.close()
              assert data.decode().split("|")[0] == "CLAUDEPAD"
              print("OK - discovery UDP:", data.decode())

              # health endpoint HTTP (dipakai pengguna untuk tes lewat browser HP)
              import urllib.request
              body = urllib.request.urlopen("http://127.0.0.1:8765/", timeout=5).read().decode()
              assert "CLAUDEPAD OK" in body and srv.APP_VERSION in body
              print("OK - health HTTP di port 8765")
              print("   generasi API websockets:", srv._ws_api_generation())

              # penyaringan adapter virtual (akar bug koneksi WiFi v2.3)
              assert core._score("172.25.224.1", "unknown") >= 90
              assert core._score("192.168.43.12", "Wi-Fi") == 0
              assert core._is_virtual("vEthernet (WSL)")
              assert not core._is_virtual("Wireless LAN adapter Wi-Fi")
              print("OK - filter adapter virtual")

          asyncio.run(main())
          PY

  build:
    needs: verify-server
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Baca versi & pastikan APK dan server sama
        id: ver
        run: |
          APK=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android/app/build.gradle.kts)
          SRV=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' server/pc_server.py)
          echo "versi APK    : $APK"
          echo "versi server : $SRV"
          # Server menolak koneksi bila versi berbeda, jadi keduanya harus
          # selalu dinaikkan bersamaan. Bedanya ditangkap di sini, bukan di HP.
          if [ "$APK" != "$SRV" ]; then
            echo "::error::Versi APK ($APK) tidak sama dengan server ($SRV) - naikkan keduanya"
            exit 1
          fi
          echo "version=$APK" >> "$GITHUB_OUTPUT"

      - name: Unduh JetBrains Mono
        continue-on-error: true
        run: |
          mkdir -p android/app/src/main/res/font
          curl -fsSL --retry 3 -o android/app/src/main/res/font/jetbrains_mono.ttf \
            "https://raw.githubusercontent.com/JetBrains/JetBrainsMono/v2.304/fonts/ttf/JetBrainsMono-Regular.ttf" \
            && echo "Font berhasil diunduh" \
            || echo "Font gagal diunduh - aplikasi akan memakai monospace bawaan"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Konfirmasi font ter-bundle
        run: |
          if [ -f android/app/src/main/res/font/jetbrains_mono.ttf ]; then
            echo "JetBrains Mono ter-bundle"
          else
            echo "Font tidak terunduh - aplikasi memakai monospace bawaan"
          fi

      - name: Siapkan artefak
        run: |
          # Nama berkas memuat versi supaya jelas saat sudah diunduh
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "CLAUDEPAD-v${{ steps.ver.outputs.version }}.apk"
          ls -lh CLAUDEPAD-v*.apk

      - name: Upload artefak
        uses: actions/upload-artifact@v4
        with:
          name: CLAUDEPAD-v${{ steps.ver.outputs.version }}
          path: CLAUDEPAD-v${{ steps.ver.outputs.version }}.apk

      - name: Publikasi release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          # API release GitHub sesekali balas "No server is currently available".
          # Itu gangguan sementara di sisi mereka, bukan kegagalan build -
          # jadi dicoba ulang beberapa kali dengan jeda menaik.
          NOTES=$(printf 'APK build otomatis dari commit %s.\n\nLihat CHANGELOG.md untuk daftar perubahan\ndan docs/bug-report.html untuk laporan pemeriksaan bug.' "$GITHUB_SHA")

          for i in 1 2 3 4 5; do
            echo "--- percobaan publikasi $i ---"
            if gh release view latest >/dev/null 2>&1; then
              # Buang SEMUA berkas .apk lama dari release ini, termasuk yang
              # bernomor versi lawas, supaya hanya ada satu APK terbaru dan
              # pengguna tidak salah unduh.
              for OLD in $(gh release view latest --json assets \
                             --jq '.assets[].name' 2>/dev/null | grep '\.apk$' || true); do
                if [ "$OLD" != "CLAUDEPAD-v$V.apk" ]; then
                  echo "menghapus aset lama: $OLD"
                  gh release delete-asset latest "$OLD" --yes >/dev/null 2>&1 || true
                fi
              done
              if gh release edit latest --title "CLAUDEPAD v$V" --notes "$NOTES" \
                 && gh release upload latest "CLAUDEPAD-v$V.apk" --clobber; then
                echo "Release v$V berhasil diperbarui"; exit 0
              fi
            else
              if gh release create latest "CLAUDEPAD-v$V.apk" \
                 --title "CLAUDEPAD v$V" --notes "$NOTES"; then
                echo "Release v$V berhasil dibuat"; exit 0
              fi
            fi
            SLEEP=$((i * 20))
            echo "gagal - menunggu ${SLEEP}s lalu mencoba lagi"
            sleep $SLEEP
          done

          echo "::error::Gagal mempublikasikan release setelah 5 percobaan."
          echo "APK tetap tersedia sebagai artefak build di halaman run ini."
          exit 1

  # ============================================================
  # Server .exe mandiri (Windows) — pengguna tak perlu Python.
  # Dibangun di runner Windows, lalu diunggah ke release yang sama.
  # ============================================================
  build-server-exe:
    needs: verify-server
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency + PyInstaller
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install websockets pycaw comtypes pystray pillow pyinstaller

      - name: Baca versi server
        id: sver
        shell: bash
        run: |
          V=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' server/pc_server.py)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Versi server: $V"

      - name: Buat ikon
        working-directory: server
        run: python make_icon.py

      - name: Bungkus jadi .exe (onefile)
        working-directory: server
        run: pyinstaller --clean --noconfirm claudepad.spec

      - name: Ganti nama & cek
        working-directory: server
        shell: bash
        run: |
          V="${{ steps.sver.outputs.version }}"
          cp dist/CLAUDEPAD-Server.exe "CLAUDEPAD-Server-v$V.exe"
          ls -lh "CLAUDEPAD-Server-v$V.exe"

      - name: Unggah artefak
        uses: actions/upload-artifact@v4
        with:
          name: CLAUDEPAD-Server-exe
          path: server/CLAUDEPAD-Server-v*.exe

      - name: Publikasikan ke release (tahan gangguan API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.sver.outputs.version }}
        shell: bash
        run: |
          FILE="server/CLAUDEPAD-Server-v$V.exe"
          for i in 1 2 3 4 5; do
            echo "--- percobaan unggah exe $i ---"
            # buang .exe versi lama dari release supaya tak menumpuk
            for OLD in $(gh release view latest --json assets \
                           --jq '.assets[].name' 2>/dev/null | grep '\.exe$' || true); do
              if [ "$OLD" != "CLAUDEPAD-Server-v$V.exe" ]; then
                gh release delete-asset latest "$OLD" --yes >/dev/null 2>&1 || true
              fi
            done
            if gh release view latest >/dev/null 2>&1; then
              if gh release upload latest "$FILE" --clobber; then
                echo "exe terunggah ke release"; exit 0
              fi
            else
              echo "release belum ada, tunggu job APK membuatnya"
            fi
            sleep $((i * 20))
          done
          echo "::warning::Gagal mengunggah exe ke release; exe tetap ada sebagai artefak build."
